spring.application.name=VitalApp Backend


server.port=8080

# ========== CONFIGURACIÓN DE POSTGRESQL ==========


spring.datasource.url=jdbc:postgresql://localhost:5432/vitalapp


spring.datasource.username=postgres


spring.datasource.password=Diery#21

# Driver de PostgreSQL (Spring lo detecta automáticamente)
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== CONFIGURACIÓN DE JPA/HIBERNATE ==========

# Deshabilitar open-in-view para evitar problemas de rendimiento
spring.jpa.open-in-view=false

# Dialecto de PostgreSQL (le dice a Hibernate cómo generar SQL)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostrar las consultas SQL en la consola (útil para aprender y depurar)
spring.jpa.show-sql=true

# Formatear el SQL para que se vea bonito en la consola
spring.jpa.properties.hibernate.format_sql=true

# ¿Qué hacer con las tablas al iniciar?
# - create: borra y crea las tablas cada vez (SOLO PARA DESARROLLO)
# - update: actualiza las tablas si cambian (RECOMENDADO PARA DESARROLLO)
# - validate: solo valida que las tablas existan
# - none: no hace nada
spring.jpa.hibernate.ddl-auto=update

# ========== CONFIGURACIÓN JWT ==========

# Clave secreta para firmar tokens (256 bits en Base64)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Tiempo de expiración del token de acceso (24 horas = 86400000 ms)
jwt.expiration=86400000

# Tiempo de expiración del refresh token (7 días = 604800000 ms)
# ========== SWAGGER/OPENAPI CONFIGURATION ==========

# Ruta de la documentación JSON
springdoc.api-docs.path=/api-docs

# Ruta de Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Habilitar Swagger UI
springdoc.swagger-ui.enabled=true

# Ordenar operaciones alfabéticamente
springdoc.swagger-ui.operations-sorter=alpha

# Ordenar tags alfabéticamente
springdoc.swagger-ui.tags-sorter=alpha

# Mostrar modelo de request
springdoc.swagger-ui.default-models-expand-depth=1

# Mostrar modelo de response
springdoc.swagger-ui.default-model-expand-depth=1

# Desactivar validación de spec
springdoc.swagger-ui.disable-swagger-default-url=true
jwt.refresh-expiration=604800000

# ========== CONFIGURACIÓN OPENAI ==========

# API Key de OpenAI (reemplaza con tu clave real)
openai.api.key=${OPENAI_API_KEY:}

# Modelo de GPT a utilizar
openai.api.model=gpt-3.5-turbo

# Temperatura para generación de texto (0.0 - 2.0)
openai.api.temperature=0.7

# Máximo número de tokens en la respuesta
openai.api.max-tokens=500