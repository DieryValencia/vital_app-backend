spring.application.name=VitalApp Backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ========== CONFIGURACIÓN DEL SERVIDOR ==========
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# ========== CONFIGURACIÓN DE POSTGRESQL ==========
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/vitalapp}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Diery#21}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========== CONFIGURACIÓN DE JPA/HIBERNATE ==========
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ========== SEGURIDAD JWT ==========
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========== CORS ==========
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3001,http://localhost:3000}
# ========== SWAGGER/OPENAPI CONFIGURATION ==========

# Ruta de la documentación JSON
springdoc.api-docs.path=/api-docs

# Ruta de Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Habilitar Swagger UI
springdoc.swagger-ui.enabled=true

# Ordenar operaciones alfabéticamente
springdoc.swagger-ui.operations-sorter=alpha

# Ordenar tags alfabéticamente
springdoc.swagger-ui.tags-sorter=alpha

# Mostrar modelo de request
springdoc.swagger-ui.default-models-expand-depth=1

# Mostrar modelo de response
springdoc.swagger-ui.default-model-expand-depth=1

# Desactivar validación de spec
springdoc.swagger-ui.disable-swagger-default-url=true

# ========== CONFIGURACIÓN OPENAI ==========
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=${OPENAI_MODEL:gpt-3.5-turbo}
openai.api.temperature=${OPENAI_TEMPERATURE:0.7}
openai.api.max-tokens=${OPENAI_MAX_TOKENS:500}

# ========== ACTUATOR (Health Check) ==========
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# ========== LOGGING ==========
logging.level.root=INFO
logging.level.com.vitalapp.vital_app_backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE