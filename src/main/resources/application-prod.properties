# ========== CONFIGURACIÓN DE PRODUCCIÓN ==========
# Este perfil se activa con: SPRING_PROFILES_ACTIVE=prod

# Base de datos
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# Logging - reducir verbosidad en producción
logging.level.root=WARN
logging.level.com.vitalapp.vital_app_backend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Seguridad - no mostrar stack traces
server.error.include-stacktrace=never
server.error.include-exception=false

# Swagger - deshabilitado en producción por seguridad
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator - solo health públicamente
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Performance
server.compression.enabled=true
server.compression.min-response-size=1024
